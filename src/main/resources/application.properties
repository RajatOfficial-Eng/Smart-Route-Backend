# Server port
server.port=8080

# DEFAULT DATABASE CONFIGURATION: In-Memory H2 Database
# This allows the project to run out-of-the-box instantly.
spring.datasource.url=jdbc:h2:mem:route_optimizer;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# OPTIONAL DATABASE CONFIGURATION: MySQL Database
# To use MySQL, uncomment the lines below and comment out the H2 configuration above.
# spring.datasource.url=jdbc:mysql://localhost:3306/route_optimizer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
